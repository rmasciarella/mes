name: tsu-stack-db-dev

services:
  postgres:
    image: postgres:18-alpine
    container_name: tsu-stack-db-dev-postgres
    environment:
      POSTGRES_DB: tsu-stack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - tsu-stack-db-dev-postgres-dev:/var/lib/postgresql/data

volumes:
  tsu-stack-db-dev-postgres-dev:
